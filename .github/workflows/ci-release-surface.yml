name: Release Surface

on:
  workflow_call:

jobs:
  release-surface:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_REMOTE_CACHE_READ_ONLY: ${{ github.event_name == 'pull_request' && 'true' || '' }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@abstract-foundation/mpp"
          - "@abstract-foundation/agw-client"
          - "@abstract-foundation/agw-react"
          - "@abstract-foundation/agw-thirdweb"
          - "@abstract-foundation/agw-web"
          - "@abstract-foundation/web3-react-agw"
          - "@abstract-foundation/agw-cli"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package release surface
        run: node .github/scripts/run-release-surface.mjs --package "${{ matrix.package }}"
