name: Cancel stale pending publishes

on:
  push:
    branches:
      - main

permissions:
  actions: write

jobs:
  cancel:
    name: Cancel stale gatekeeper runs awaiting publish approval
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stale runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          mapfile -t RUN_IDS < <(
            gh run list \
              --repo="$REPO" \
              --workflow=gatekeeper.yml \
              --branch=main \
              --limit=50 \
              --json databaseId,status,headSha \
            | jq -r \
                --arg current_sha "$CURRENT_SHA" \
                '.[]
                  | select(.status == "in_progress" or .status == "waiting" or .status == "queued")
                  | select(.headSha != $current_sha)
                  | .databaseId'
          )

          if [[ ${#RUN_IDS[@]} -eq 0 ]]; then
            echo "No stale gatekeeper runs on main (all active runs are tied to $CURRENT_SHA)."
            exit 0
          fi

          for RUN_ID in "${RUN_IDS[@]}"; do
            PENDING_COUNT=$(
              gh api "repos/$REPO/actions/runs/$RUN_ID/pending_deployments" \
                --jq 'length'
            )

            if [[ "$PENDING_COUNT" -eq 0 ]]; then
              echo "Run $RUN_ID: no pending deployments, skipping."
              continue
            fi

            BLOCKING_JOBS=$(
              gh api "repos/$REPO/actions/runs/$RUN_ID/jobs?per_page=100" \
                --jq '[
                  .jobs[]
                  | select(.status == "in_progress" or .status == "queued")
                  | select((.name | startswith("Publish /")) | not)
                  | select(.name != "CI Gatekeeper")
                ] | length'
            )

            if [[ "$BLOCKING_JOBS" -gt 0 ]]; then
              echo "Run $RUN_ID: pending publish, but $BLOCKING_JOBS non-publish job(s) still running; leaving it alone."
              continue
            fi

            echo "Run $RUN_ID: cancelling (pending publish with CI complete)."
            gh api --method POST "repos/$REPO/actions/runs/$RUN_ID/cancel" || {
              echo "Failed to cancel run $RUN_ID; continuing."
            }
          done
