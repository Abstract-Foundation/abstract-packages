name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect publishable release
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      packages_json: ${{ steps.detect.outputs.packages_json }}
      summary_markdown: ${{ steps.detect.outputs.summary_markdown }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Detect publishable packages
        id: detect
        run: node .github/scripts/detect-publishable.mjs

  verify-release-surface:
    name: Verify release surface
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    uses: ./.github/workflows/ci-release-surface.yml
    secrets: inherit

  verify-agw-client:
    name: Verify AGW client
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    uses: ./.github/workflows/ci-agw-client.yml
    secrets: inherit

  publish:
    name: Publish to npm
    needs:
      - detect
      - verify-release-surface
      - verify-agw-client
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      contents: write
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: "true"
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*' --force

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
